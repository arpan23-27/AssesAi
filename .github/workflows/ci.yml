name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend deps
        run: npm install --no-audit --no-fund
        working-directory: backend
      - name: Install frontend deps
        run: npm install --no-audit --no-fund
        working-directory: frontend
      - name: Lint backend
        run: npm run lint
        working-directory: backend
      - name: Lint frontend
        run: npm run lint
        working-directory: frontend
      - name: Prettier check (backend)
        run: npm run format:check
        working-directory: backend

  test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: assessai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:password@localhost:5432/assessai_test
      TEST_DATABASE_URL: postgresql://postgres:password@localhost:5432/assessai_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test_secret_used_only_in_ci_do_not_use_in_prod
      JWT_ACCESS_EXPIRES_IN: 15m
      GROQ_API_KEY: test-key-not-called-in-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend deps
        run: npm install --no-audit --no-fund
        working-directory: backend
      - name: Run migrations
        run: npm run migrate
        working-directory: backend
      - name: Run tests
        run: npm test
        working-directory: backend