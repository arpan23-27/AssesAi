version: "3.9"

services:
  app:
    build: .
    container_name: assessai-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/assessai
      MONGO_URI: mongodb://mongodb:27017/assessai
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - mongodb
      - redis

  postgres:
    image: postgres:15
    container_name: assessai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: assessai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6
    container_name: assessai-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7
    container_name: assessai-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  mongodb_data:
