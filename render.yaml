# Render Blueprint for AssesAI.
#   API (Docker) + managed PostgreSQL + managed Key Value (Redis-compatible).
#
# Deploy: push this file to your repo, then in the Render Dashboard choose
#   New > Blueprint and select this repository.
# Spec:   https://render.com/docs/blueprint-spec
# Schema: https://render.com/schema/render.yaml.json
#
# All three resources share a region so the API can reach Postgres and Key Value
# over Render's internal network. Change `region` if Singapore is far from you;
# just keep all three identical.

databases:
  - name: assesai-postgres
    plan: free
    region: singapore
    # NOTE: free PostgreSQL instances expire 30 days after creation. Upgrade to a
    # paid plan before then if you want the data to persist long-term.

services:
  # Redis-compatible cache (access-token blacklist + AI explanation cache).
  - type: keyvalue
    name: assesai-keyvalue
    plan: free
    region: singapore
    maxmemoryPolicy: noeviction
    ipAllowList: []          # required field; empty list = internal access only

  # The API. Builds from backend/Dockerfile.
  - type: web
    name: assesai-api
    runtime: docker
    plan: free
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    # Run idempotent migrations + seed, then start the server. On paid plans you
    # can move the migrate/seed step to a preDeployCommand instead.
    dockerCommand: sh -c "npm run migrate && npm run seed && node src/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: assesai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: assesai-keyvalue
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true       # Render generates a secure random value
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: GROQ_API_KEY
        sync: false               # you are prompted for this in the dashboard
      - key: CLIENT_ORIGIN
        sync: false               # set to your deployed frontend URL (Vercel/Netlify)
      - key: ADMIN_EMAIL
        sync: false               # optional: enables the admin-only /api/ai/generate
      - key: ADMIN_PASSWORD
        sync: false               # optional: password for the seeded admin user
